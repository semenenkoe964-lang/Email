{% extends 'mailapp/base.html' %}

{% block content %}
<div class="box">
    <h2>{{ email.subject }}</h2>
    <p><strong>От:</strong> {{ email.sender }}</p>
    <p><strong>Кому:</strong> {{ email.recipient }}</p>
    <p><strong>Папка:</strong> {{ email.folder }}</p>
    <p><strong>Дата:</strong> {{ email.created_at|date:'d.m.Y H:i' }}</p>
    <hr>
    <p style="white-space: pre-line;">{{ email.body }}</p>
</div>

<div class="box">
    <h3>Действия</h3>
    <form method="post" action="{% url 'move_email' email.id %}">
        {% csrf_token %}
        <label>Переместить в папку:</label>
        <select name="folder">
            <option value="inbox">Входящие</option>
            <option value="archive">Архив</option>
            <option value="trash">Корзина</option>
            <option value="sent">Исходящие</option>
        </select>
        <button type="submit">Переместить</button>
    </form>

    <form method="post" action="{% url 'delete_email' email.id %}">
        {% csrf_token %}
        <button type="submit">Удалить письмо</button>
    </form>
</div>
{% endblock %}
