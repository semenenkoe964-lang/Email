<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ee-mail</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; background: #f3f3f3; }
        .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        a { text-decoration: none; color: #1a4fb5; }
        nav a { margin-right: 12px; }
        input, textarea, select, button { width: 100%; padding: 8px; margin-top: 6px; margin-bottom: 12px; box-sizing: border-box; }
        button { width: auto; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        .message { padding: 10px; border-radius: 6px; margin-bottom: 10px; background: #e7f4e4; }
        .unread { font-weight: bold; }
        .small { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>ee-mail</h1>
        <p><strong>Пользователь:</strong> {{ current_user }}</p>
        <nav>
            <a href="{% url 'home' %}">Главная</a>
            <a href="{% url 'compose_email' %}">Написать</a>
            <a href="{% url 'email_list' 'inbox' %}">Входящие</a>
            <a href="{% url 'email_list' 'sent' %}">Исходящие</a>
            <a href="{% url 'email_list' 'archive' %}">Архив</a>
            <a href="{% url 'email_list' 'trash' %}">Корзина</a>
        </nav>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
